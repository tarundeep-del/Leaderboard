<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Leaderboard</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0e1a3a; /* Deepened the blue for better TV contrast */
    color: #fff;
    overflow: hidden;
    height: 100vh;
  }

  .container {
    display: flex;
    height: 100vh;
  }

  /* SIDEBAR: Centered and Bold */
  .sidebar {
    width: 140px;
    background: linear-gradient(180deg, #ff7a18, #af4c00);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 10px 0 20px rgba(0,0,0,0.4);
    z-index: 5;
  }

  .sidebar h2 {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 50px;
    letter-spacing: 10px;
    margin: 0;
    text-transform: uppercase;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
  }

  /* BOARD: Smooth Flex Layout */
  .board {
    flex: 1;
    padding: 50px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    perspective: 1000px; /* Adds depth for transitions */
  }

  /* ROW: The secret to smoothness is 'order' and 'transition' */
  .row {
    display: flex;
    transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); /* Slow, smooth movement */
    width: 100%;
  }

  .team {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 20px;
    padding: 15px 30px;
    border-radius: 100px; /* Pill shape looks better for movement */
    font-weight: bold;
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .logo {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: #fff;
    padding: 2px;
    flex-shrink: 0;
  }

  .logo img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  .details { flex: 1; }

  .name {
    font-size: 26px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  }

  .stats {
    font-size: 16px;
    opacity: 0.85;
    font-weight: 400;
  }

  .percent {
    font-size: 26px;
    background: rgba(0,0,0,0.25);
    padding: 8px 25px;
    border-radius: 50px;
    min-width: 120px;
    text-align: center;
  }

  /* Top 1 Highlight */
  .row[style*="order: 0"] .team {
    transform: scale(1.02);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.4);
  }
</style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>LEADERBOARD</h2>
  </div>
  <div class="board" id="leaderboard"></div>
</div>

<script>
  const SHEET_ID = "1C5pIirqDizlytoBk4PqOWZuFpvvOg30ehdhF7lgjKyU";
  const SHEET_NAME = "LEADERBOARD";
  const REFRESH_INTERVAL = 15000; // Increased to 15s for snappier updates

  const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

  async function fetchData() {
    try {
      const res = await fetch(URL);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      return json.table.rows.map(r => ({
        name: r.c[0]?.v || "Unknown",
        total: r.c[1]?.v || 0,
        target: r.c[2]?.v || 0,
        percent: r.c[2]?.v ? Math.round((r.c[1]?.v / r.c[2]?.v) * 100) : 0,
        color: r.c[3]?.v || "#444",
        logo: r.c[4]?.v || ""
      }));
    } catch (e) { return []; }
  }

  function updateDisplay(data) {
    const board = document.getElementById("leaderboard");
    
    // Sort data by percentage
    data.sort((a, b) => b.percent - a.percent);

    data.forEach((team, index) => {
      const safeId = "t-" + team.name.replace(/[^a-z0-9]/gi, '');
      let row = document.getElementById(safeId);

      if (!row) {
        row = document.createElement("div");
        row.className = "row";
        row.id = safeId;
        row.innerHTML = `
          <div class="team">
            <div class="logo"><img src="" alt=""></div>
            <div class="details">
              <div class="name"></div>
              <div class="stats"></div>
            </div>
            <div class="percent"></div>
          </div>`;
        board.appendChild(row);
      }

      // Smooth Position Update
      row.style.order = index;

      // Smooth Content Update
      const teamDiv = row.querySelector(".team");
      teamDiv.style.backgroundColor = team.color;
      
      row.querySelector(".name").textContent = team.name;
      row.querySelector(".stats").textContent = `${team.total.toLocaleString()} Punched Revenue`;
      row.querySelector(".percent").textContent = `${team.percent}%`;
      
      const img = row.querySelector("img");
      if(team.logo && img.src !== team.logo) {
        img.src = team.logo;
      }
    });
  }

  async function start() {
    const data = await fetchData();
    if (data.length > 0) updateDisplay(data);
  }

  start();
  setInterval(start, REFRESH_INTERVAL);
</script>
</body>
</html>
