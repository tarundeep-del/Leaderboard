<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard Display</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1b3067;
    color: #fff;
    overflow: hidden;
    height: 100vh;
  }

  /* Company Logo */
  .company-logo {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 140px;
    z-index: 10;
  }

  .company-logo img {
    width: 100%;
  }

  .container {
    display: flex;
    height: 100vh;
  }

  /* Sidebar Fix: Centered vertical text */
  .sidebar {
    width: 150px;
    background: linear-gradient(180deg, #ff7a18, #0e2a57);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 5px 0 15px rgba(0,0,0,0.3);
  }

  .sidebar .text h2 {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 40px;
    font-weight: bold;
    letter-spacing: 6px;
    margin: 0;
    text-transform: uppercase;
  }

  /* Board Fix: Centering and spacing for TV */
  .board {
    flex: 1;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Keeps rows centered vertically if list is short */
    gap: 15px; /* Space between bars */
  }

  .row {
    transition: all 0.8s ease-in-out;
  }

  .team {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 18px 30px;
    border-radius: 60px;
    font-weight: bold;
    box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .logo {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: #fff;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid #fff;
  }

  .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .details {
    flex: 1;
  }

  .name {
    font-size: 24px;
    text-transform: uppercase;
  }

  .stats {
    font-size: 16px;
    opacity: 0.9;
    font-weight: normal;
  }

  .percent {
    font-size: 22px;
    white-space: nowrap;
    background: rgba(0,0,0,0.2);
    padding: 10px 25px;
    border-radius: 30px;
  }
</style>
</head>

<body>

<div class="company-logo">
  <img src="logos/Company.jpg" alt="Company Logo">
</div>

<div class="container">
  <div class="sidebar">
    <div class="text"><h2>LEADERBOARD</h2></div>
  </div>

  <div class="board" id="leaderboard">
    </div>
</div>

<script>
  /************** CONFIG **************/
  const SHEET_ID = "1C5pIirqDizlytoBk4PqOWZuFpvvOg30ehdhF7lgjKyU";
  const SHEET_NAME = "LEADERBOARD";
  const REFRESH_INTERVAL = 30000; // 30 sec
  /**********************************/

  const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

  async function fetchData() {
    try {
      const res = await fetch(URL);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));

      return json.table.rows.map(r => {
        const total = r.c[1]?.v || 0;
        const target = r.c[2]?.v || 0;
        const percent = target ? Math.round((total / target) * 100) : 0;

        return {
          name: r.c[0]?.v || "",
          total: total,
          percent: percent,
          color: r.c[3]?.v || "#888",
          logo: r.c[4]?.v || ""
        };
      });
    } catch (e) {
      console.error("Fetch error", e);
      return [];
    }
  }

  function render(data) {
    const board = document.getElementById("leaderboard");

    data.forEach((team, index) => {
      const safeId = "row-" + team.name.replace(/\s+/g, "_");
      let row = document.getElementById(safeId);

      // Create row if it doesn't exist
      if (!row) {
        row = document.createElement("div");
        row.className = "row";
        row.id = safeId;

        row.innerHTML = `
          <div class="team">
            <div class="logo"><img src="" alt=""></div>
            <div class="details">
              <div class="name"></div>
              <div class="stats"></div>
            </div>
            <div class="percent"></div>
          </div>
        `;
        board.appendChild(row);
      }

      // Update position (order)
      row.style.order = index;

      // Update appearance
      const teamDiv = row.querySelector(".team");
      teamDiv.style.background = team.color;

      row.querySelector(".name").textContent = team.name;
      row.querySelector(".stats").textContent = `${team.total.toLocaleString()} Punched Revenue`;
      row.querySelector(".percent").textContent = `${team.percent}% Achieved`;

      const img = row.querySelector("img");
      if (img.src !== team.logo) {
        img.src = team.logo;
        img.onerror = () => img.src = "logos/default.png";
      }
    });
  }

  async function updateLeaderboard() {
    const data = await fetchData();
    if (data.length > 0) {
      // Rank by achievement % descending
      data.sort((a, b) => b.percent - a.percent);
      render(data);
    }
  }

  // Initial call and set interval
  updateLeaderboard();
  setInterval(updateLeaderboard, REFRESH_INTERVAL);
</script>

</body>
</html>
