<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro TV Leaderboard</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: #0e1a3a; /* Background Blue */
    color: #fff;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* Company Logo Positioning */
  .company-logo {
    position: absolute;
    top: 2vh;
    right: 2vw;
    width: 15vw;
    max-width: 180px;
    z-index: 20; /* High z-index to stay on top */
  }

  .company-logo img {
    width: 100%;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
  }

  .container {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* SIDEBAR: Gradient Orange to Background Blue */
  .sidebar {
    width: 10%;
    min-width: 110px;
    background: linear-gradient(180deg, #ff7a18 0%, #0e1a3a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 15px 0 35px rgba(0,0,0,0.6);
    z-index: 5;
  }

  .sidebar h2 {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 3.8vw;
    letter-spacing: 0.8vw;
    margin: 0;
    text-transform: uppercase;
    white-space: nowrap;
    text-shadow: 2px 2px 20px rgba(0,0,0,0.5);
    font-weight: 800;
  }

  /* BOARD AREA */
  .board {
    flex: 1;
    height: 100vh;
    /* Increased top padding (12vh) to prevent merging with company logo */
    padding: 12vh 4vw 4vh; 
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    gap: 1.2vh;
  }

  .row {
    display: flex;
    transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    width: 100%;
    height: 9%;
  }

  /* TEAM BARS */
  .team {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 1.5vw;
    padding: 0 2.5vw;
    border-radius: 100px; 
    font-weight: bold;
    box-shadow: 0 10px 25px rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* White lining removed from logo container */
  .logo {
    width: 4.2vw;
    height: 4.2vw;
    max-width: 75px;
    max-height: 75px;
    border-radius: 50%;
    background: transparent; /* Removed white background */
    flex-shrink: 0;
    border: none; /* Removed white border */
    overflow: hidden;
  }

  .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .details { flex: 1; overflow: hidden; }

  .name {
    font-size: 2.1vw;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    white-space: nowrap;
  }

  .stats {
    font-size: 1.2vw;
    opacity: 0.9;
    font-weight: 400;
  }

  .percent {
    font-size: 2.1vw;
    background: rgba(0,0,0,0.35);
    padding: 0.8vh 2.5vw;
    border-radius: 100px;
    min-width: 13vw;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* 1st Place Polish */
  .row[style*="order: 0"] .team {
    border: 2px solid rgba(255, 255, 255, 0.4);
    transform: scale(1.02);
    z-index: 10;
  }
</style>
</head>
<body>

<div class="company-logo">
  <img src="logos/Company.jpg" alt="Company Logo" onerror="this.style.display='none'">
</div>

<div class="container">
  <div class="sidebar">
    <div class="text"><h2>LEADERBOARD</h2></div>
  </div>
  <div class="board" id="leaderboard"></div>
</div>

<script>
  const SHEET_ID = "1C5pIirqDizlytoBk4PqOWZuFpvvOg30ehdhF7lgjKyU";
  const SHEET_NAME = "LEADERBOARD";
  const REFRESH_INTERVAL = 15000;

  const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

  async function fetchData() {
    try {
      const res = await fetch(URL);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      return json.table.rows.map(r => ({
        name: r.c[0]?.v || "Unknown",
        total: r.c[1]?.v || 0,
        target: r.c[2]?.v || 0,
        percent: r.c[2]?.v ? Math.round((r.c[1]?.v / r.c[2]?.v) * 100) : 0,
        color: r.c[3]?.v || "#444",
        logo: r.c[4]?.v || ""
      }));
    } catch (e) { return []; }
  }

  function updateDisplay(data) {
    const board = document.getElementById("leaderboard");
    data.sort((a, b) => b.percent - a.percent);

    data.forEach((team, index) => {
      const safeId = "t-" + team.name.replace(/[^a-z0-9]/gi, '');
      let row = document.getElementById(safeId);

      if (!row) {
        row = document.createElement("div");
        row.className = "row";
        row.id = safeId;
        row.innerHTML = `
          <div class="team">
            <div class="logo"><img src="" alt=""></div>
            <div class="details">
              <div class="name"></div>
              <div class="stats"></div>
            </div>
            <div class="percent"></div>
          </div>`;
        board.appendChild(row);
      }

      row.style.order = index;
      const teamDiv = row.querySelector(".team");
      teamDiv.style.background = `linear-gradient(90deg, ${team.color} 0%, rgba(0,0,0,0.6) 100%), ${team.color}`;
      
      row.querySelector(".name").textContent = team.name;
      row.querySelector(".stats").textContent = `${team.total.toLocaleString()} Punched Revenue`;
      row.querySelector(".percent").textContent = `${team.percent}%`;
      
      const img = row.querySelector("img");
      if(team.logo && img.src !== team.logo) {
        img.src = team.logo;
        img.onerror = () => img.src = 'logos/default.png';
      }
    });
  }

  async function start() {
    const data = await fetchData();
    if (data.length > 0) updateDisplay(data);
  }

  start();
  setInterval(start, REFRESH_INTERVAL);
</script>
</body>
</html>
