<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro TV Leaderboard</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: #0e1a3a;
    color: #fff;
    overflow: hidden; /* Prevents scrollbars on TV */
    height: 100vh;
    width: 100vw;
  }

  .container {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* SIDEBAR: Scaled for TV visibility */
  .sidebar {
    width: 10%; /* Uses percentage for better scaling */
    min-width: 100px;
    background: linear-gradient(180deg, #ff7a18, #af4c00);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 10px 0 20px rgba(0,0,0,0.4);
    z-index: 5;
  }

  .sidebar h2 {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 3.5vw; /* Font size scales with screen width */
    letter-spacing: 0.5vw;
    margin: 0;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* BOARD: Responsive Flex Container */
  .board {
    flex: 1;
    height: 100vh;
    padding: 2vh 3vw; /* Dynamic padding based on viewport */
    display: flex;
    flex-direction: column;
    justify-content: space-evenly; /* Evenly spaces rows to fill the height */
    gap: 1vh;
  }

  .row {
    display: flex;
    transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    width: 100%;
    height: 10%; /* Ensures 8-10 rows fit perfectly on one screen */
  }

  .team {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 1.5vw;
    padding: 0 2vw;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .logo {
    width: 3.5vw;
    height: 3.5vw;
    max-width: 60px;
    max-height: 60px;
    border-radius: 50%;
    background: #fff;
    flex-shrink: 0;
  }

  .logo img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  .details { flex: 1; overflow: hidden; }

  .name {
    font-size: 1.8vw; /* Fluid typography */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stats {
    font-size: 1.1vw;
    opacity: 0.85;
    font-weight: 400;
  }

  .percent {
    font-size: 1.8vw;
    background: rgba(0,0,0,0.25);
    padding: 0.5vh 1.5vw;
    border-radius: 50px;
    min-width: 10vw;
    text-align: center;
  }

  /* Top 1 Highlight */
  .row[style*="order: 0"] .team {
    border: 2px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
  }
</style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>LEADERBOARD</h2>
  </div>
  <div class="board" id="leaderboard"></div>
</div>

<script>
  const SHEET_ID = "1C5pIirqDizlytoBk4PqOWZuFpvvOg30ehdhF7lgjKyU";
  const SHEET_NAME = "LEADERBOARD";
  const REFRESH_INTERVAL = 15000;

  const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

  async function fetchData() {
    try {
      const res = await fetch(URL);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      return json.table.rows.map(r => ({
        name: r.c[0]?.v || "Unknown",
        total: r.c[1]?.v || 0,
        target: r.c[2]?.v || 0,
        percent: r.c[2]?.v ? Math.round((r.c[1]?.v / r.c[2]?.v) * 100) : 0,
        color: r.c[3]?.v || "#444",
        logo: r.c[4]?.v || ""
      }));
    } catch (e) { return []; }
  }

  function updateDisplay(data) {
    const board = document.getElementById("leaderboard");
    data.sort((a, b) => b.percent - a.percent);

    data.forEach((team, index) => {
      const safeId = "t-" + team.name.replace(/[^a-z0-9]/gi, '');
      let row = document.getElementById(safeId);

      if (!row) {
        row = document.createElement("div");
        row.className = "row";
        row.id = safeId;
        row.innerHTML = `
          <div class="team">
            <div class="logo"><img src="" alt=""></div>
            <div class="details">
              <div class="name"></div>
              <div class="stats"></div>
            </div>
            <div class="percent"></div>
          </div>`;
        board.appendChild(row);
      }

      row.style.order = index;
      const teamDiv = row.querySelector(".team");
      teamDiv.style.backgroundColor = team.color;
      
      row.querySelector(".name").textContent = team.name;
      row.querySelector(".stats").textContent = `${team.total.toLocaleString()} Punched Revenue`;
      row.querySelector(".percent").textContent = `${team.percent}%`;
      
      const img = row.querySelector("img");
      if(team.logo && img.src !== team.logo) {
        img.src = team.logo;
      }
    });
  }

  async function start() {
    const data = await fetchData();
    if (data.length > 0) updateDisplay(data);
  }

  start();
  setInterval(start, REFRESH_INTERVAL);
</script>
</body>
</html>
